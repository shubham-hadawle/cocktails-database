services:
  mysql:
    image: mysql:8.0
    container_name: mixmaster-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cocktail_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - "./SQL queries:/docker-entrypoint-initdb.d:ro"

volumes:
  mysql_data:
  